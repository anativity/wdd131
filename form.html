<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Amanda's project page for WDD 131: Dynamic Web Fundamentals. Week 5 product review form assignment">
  <meta name="author" content="Amanda Adams">
  <title>Amanda Adams - Week 5 product review form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Satisfy&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">

  <script src="scripts/form.js" defer></script>
</head>

<body>
  <header>
    <h1>About the Product - Review</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      <div class="group">
        <label for="product" class="required">Product</label>
        <select id="product" name="product" required>
          <option value="" disabled selected>Select a product...
          </option>
        </select>
      </div>

      <div class="ratings">
        <span class="required">Please provide your rating from the options below - thank you!</span>
          <label><input type="radio" id="rating1"
              name="rating" value="1" required> 1</label>
          <label><input type="radio" id="rating2"
              name="rating" value="2" required> 2</label>
          <label><input type="radio" id="rating3"
              name="rating" value="3" required> 3</label>
          <label><input type="radio" id="rating4"
              name="rating" value="4" required> 4</label>
          <label><input type="radio" id="rating5"
              name="rating" value="5" required> 5</label>
      </div>

      <div class="date">
        <label class="required">Please Provide The Date of
          Installation</label>
        <input type="date" id="install" name="install" required>
      </div>

      <div class="features">
        <span>What Features Are Demonstrated?</span>
        <label><input type="checkbox" id="feature1"
            name="features" value="durable"> Durable</label>
        <label><input type="checkbox" id="feature2"
            name="features" value="affordable"> Affordable</label>
        <label><input type="checkbox" id="feature3"
            name="features" value="high-quality"> High Quality</label>
        <label><input type="checkbox" id="feature4"
            name="features" value="easy-to-use"> Easy to Use</label>
      </div>

      <div class="write">
        <label>Please utilize this space to provide any comments</label>
        <textarea id="review" name="review" rows="4"></textarea>
      </div>
      <div class="name">
        <label>Tell us who we can thank for leaving this review</label>
        <input type="text" id="username" name="username">
      </div>

      <button type="submit">Provide my review</button>
    </form>

  </main>


  <footer class="footer">
    <p> © <span id="currentyear"></span> Amanda Adams - Florida, USA</p>
    <p id="lastModified"></p>
  </footer>
</body>

</html>
