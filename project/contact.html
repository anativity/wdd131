<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Contact ANA Violin Studio to schedule lessons or ask questions about violin instruction.">
    <meta name="author" content="Amanda Adams">
    <title>Contact | ANA Violin Studio</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com"
        crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Satisfy&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>
            <img src="images/hero.svg" alt="ANA Violin Studio Logo"
                class="logo">
        </h1>
        <button id="menu-button" aria-label="Menu"></button>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="listen.html">Listen & Explore</a>
            <a href="basics.html">Violin Basics</a>
            <a href="lessons.html">Lesson Information</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>


    <main>
        <section>
            <h2 class="page-title">Contact</h2>
            <p>Send a message to learn more about lessons or
                availability.</p>
        </section>

        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" name="name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> ANA Violin Studio</p>
    </footer>

    <script src="scripts/main.js"></script>
</body>

</html>
