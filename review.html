<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Submitted</title>

  <link rel="stylesheet" href="styles/form.css">
  <script src="review.js" defer></script>
</head>

<body>

  <header>
    <h1>Thank You For Your Feedback! We appreciate you taking time to leave a review!</h1>
  </header>

  <main>
    <p>Thank you for providing your feedback!</p>
    <p>Number of Reviewers: <span id="count"></span></p>
  </main>

  <footer class="footer">
    <p>© <span id="currentyear"></span> Amanda Adams - Florida, USA</p>
    <p id="lastModified"></p>
  </footer>

  <script>
    document.getElementById("currentyear").textContent = new Date().getFullYear();
    document.getElementById("lastModified").textContent = document.lastModified;
  </script>

</body>
</html>
